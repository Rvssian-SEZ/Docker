# Place at .github/workflows/itops2-ci.yml in the Rvssian-SEZ/Docker repo root.
# Builds on push to main when files under itops2/ change.
name: itops2-ci

on:
  push:
    branches: [main]
    paths: ["itops2/**"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' itops2/app/version.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: itops2
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/rvssian-sez/itops2:latest
            ghcr.io/rvssian-sez/itops2:${{ steps.version.outputs.version }}
