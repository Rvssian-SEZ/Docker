<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — IT Helpdesk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background:#0f1117; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:2.5rem; width:100%; max-width:380px; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <i class="bi bi-headset" style="font-size:2.5rem;color:#58a6ff"></i>
    <h4 class="mt-3 mb-1">IT Helpdesk</h4>
    <p class="text-muted small mb-4">Sign in with your organisation account</p>
    {% if error %}
    <div class="alert alert-danger text-start small">{{ error }}</div>
    {% endif %}
    <a href="/auth/login" class="btn btn-primary w-100">
      <i class="bi bi-shield-lock me-2"></i>Sign in with Authentik
    </a>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
