<div class="toast show align-items-center border-0 text-bg-{{ 'success' if ok else 'danger' }}"
     role="alert" style="position:fixed; top:1rem; right:1rem; z-index:1080"
    >
  <div class="d-flex">
    <div class="toast-body">{{ message }}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto"
            onclick="this.closest('.toast').remove()"></button>
  </div>
</div>
<script>setTimeout(() => document.querySelectorAll('#toast-area .toast').forEach(t => t.remove()), 3000)</script>
