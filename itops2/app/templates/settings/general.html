{% extends "base.html" %}
{% block title %}Settings — {{ app_name }}{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Settings</h1>
{% include "settings/_tabs.html" %}

<form hx-post="/settings/general" hx-target="#toast-area" hx-swap="innerHTML" class="col-lg-7">
  {% for f in fields %}
    {% if f.type == 'bool' %}
    <div class="form-check form-switch mb-3">
      <input class="form-check-input" type="checkbox" name="{{ f.key }}" value="true"
             id="f-{{ loop.index }}" {{ 'checked' if f.value == 'true' }}>
      <label class="form-check-label" for="f-{{ loop.index }}">{{ f.label }}</label>
      <div class="form-text">{{ f.help }}</div>
    </div>
    {% else %}
    <div class="mb-3">
      <label class="form-label">{{ f.label }}</label>
      <input class="form-control" name="{{ f.key }}" value="{{ f.value }}"
             {% if f.type == 'int' %}inputmode="numeric"{% endif %}>
      <div class="form-text">{{ f.help }}</div>
    </div>
    {% endif %}
  {% endfor %}
  <button class="btn btn-primary">
    <span class="htmx-indicator spinner-border spinner-border-sm me-1"></span>Save
  </button>
</form>
{% endblock %}
