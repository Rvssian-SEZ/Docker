<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow" style="width:22rem">
    <div class="card-body p-4">
      <h1 class="h4 mb-3 text-center">{{ app_name }}</h1>
      {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Sign in</button>
      </form>
      {% if oidc_enabled %}
      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1"><span class="px-2 text-secondary small">or</span><hr class="flex-grow-1">
      </div>
      <a href="/auth/oidc/login" class="btn btn-outline-light w-100">{{ oidc_label }}</a>
      {% endif %}
      <div class="text-secondary small mt-3 text-center">v{{ app_version }}</div>
    </div>
  </div>
</body>
</html>
