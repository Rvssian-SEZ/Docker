<form class="row row-cols-lg-auto g-2 align-items-center mb-3"
      hx-get="/inventory" hx-target="#inventory-table" hx-swap="outerHTML" hx-push-url="true"
      hx-trigger="change, keyup changed delay:400ms">
  <div class="col">
    <select class="form-select form-select-sm" name="category_id">
      <option value="">All categories</option>
      {% for c in categories %}
      <option value="{{ c.id }}" {{ 'selected' if category_id == c.id|string }}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col">
    <select class="form-select form-select-sm" name="location_id">
      <option value="">All locations</option>
      {% for l in locations %}
      <option value="{{ l.id }}" {{ 'selected' if location_id == l.id|string }}>{{ l.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="low-stock-toggle" name="low_stock" value="1"
             {{ 'checked' if low_stock == '1' }}>
      <label class="form-check-label" for="low-stock-toggle">Low stock only</label>
    </div>
  </div>
  <div class="col flex-grow-1">
    <input class="form-control form-control-sm" type="search" name="q" placeholder="Search name…" value="{{ q or '' }}">
  </div>
</form>
