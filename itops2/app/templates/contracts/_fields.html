{# Shared create/edit fields. Expects: form_action, contract (None for create),
   contract_types, companies, locations, currencies, default_currency,
   multi_company, submit_label. #}
<form hx-post="{{ form_action }}" hx-target="#toast-area" hx-swap="innerHTML" class="col-lg-8">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Name</label>
      <input name="name" class="form-control" value="{{ contract.name if contract else '' }}" required>
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Type</label>
      <select name="contract_type" class="form-select" required>
        {% for t in contract_types %}
        <option value="{{ t.value }}" {{ 'selected' if contract and contract.contract_type == t }}>{{ t.value }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Vendor</label>
      <input name="vendor" class="form-control" value="{{ contract.vendor if contract and contract.vendor else '' }}">
    </div>
    {% if multi_company %}
    <div class="col-md-4 mb-3">
      <label class="form-label">Company</label>
      <select name="company_id" class="form-select">
        <option value="">— none —</option>
        {% for c in companies %}
        <option value="{{ c.id }}" {{ 'selected' if contract and contract.company_id == c.id }}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}
    <div class="col-md-4 mb-3">
      <label class="form-label">Location</label>
      <select name="location_id" class="form-select">
        <option value="">— none —</option>
        {% for l in locations %}
        <option value="{{ l.id }}" {{ 'selected' if contract and contract.location_id == l.id }}>{{ l.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-3 mb-3">
      <label class="form-label">Start date</label>
      <input name="start_date" type="date" class="form-control"
             value="{{ contract.start_date if contract and contract.start_date else '' }}">
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label">End / renewal date</label>
      <input name="end_date" type="date" class="form-control" required
             value="{{ contract.end_date if contract else '' }}">
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label">Renewal period (months)</label>
      <input name="renewal_period_months" type="number" min="0" class="form-control"
             value="{{ contract.renewal_period_months if contract and contract.renewal_period_months is not none else '' }}">
    </div>
    <div class="col-md-3 mb-3 d-flex align-items-end">
      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" name="auto_renews" value="true" id="autoRenews"
               {{ 'checked' if contract and contract.auto_renews }}>
        <label class="form-check-label" for="autoRenews">Auto-renews</label>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Cost</label>
      <input name="cost" type="number" step="0.01" min="0" class="form-control"
             value="{{ contract.cost if contract and contract.cost is not none else '' }}">
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Currency</label>
      <select name="currency" class="form-select">
        <option value="">— none —</option>
        {% for c in currencies %}
        <option value="{{ c.code }}"
          {{ 'selected' if (contract and contract.currency == c.code) or (not contract and c.code == default_currency) }}>
          {{ c.code }}
        </option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="3">{{ contract.notes if contract and contract.notes else '' }}</textarea>
  </div>

  <button class="btn btn-primary">
    <span class="htmx-indicator spinner-border spinner-border-sm me-1"></span>{{ submit_label }}
  </button>
</form>
