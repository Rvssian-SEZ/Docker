version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: itops_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-itops}
      POSTGRES_USER: ${POSTGRES_USER:-itops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itops_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itops} -d ${POSTGRES_DB:-itops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: itops_app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-itops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-itops}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      AUTHENTIK_BASE_URL: ${AUTHENTIK_BASE_URL:?AUTHENTIK_BASE_URL is required}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:?AUTHENTIK_CLIENT_ID is required}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:?AUTHENTIK_CLIENT_SECRET is required}
      AUTHENTIK_SLUG: ${AUTHENTIK_SLUG:-itops}
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

    depends_on:
      db:
        condition: service_healthy
    networks:
      - itops_net
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Uncomment for live reload during development:
      # - ./app:/app
      - app_logs:/app/logs
      - ./root_ca.crt:/usr/local/share/ca-certificates/root_ca.crt:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: itops_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@home.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - itops_net
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  app_logs:

networks:
  itops_net:
    driver: bridge
